<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>JoSAA College Predictor 2026</title>
    <style>
        /* Apply both background and text color directly to the header cells (th) */
        .table thead th {
            background-color: #1e3a8a !important; /* Deep navy blue background */
            color: #ffffff !important;            /* Clean white text */
            font-weight: 600;
            vertical-align: middle;
            text-align: center;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white text-center">
                <h2>JoSAA College Predictor 2026</h2>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/predict" autocomplete="off">
                    
                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label fw-bold text-end">Exam Type</label>
                        <div class="col-sm-4">
                            <select name="exam_type" class="form-select" required>
                                <option value="JEE Advanced">JEE Advanced (For IITs)</option>
                                <option value="JEE Main">JEE Main (For NITs, IIITs, GFTIs)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label fw-bold text-end">Rank / CRL</label>
                        <div class="col-sm-4">
                            <input type="number" name="rank" min="1" class="form-control" placeholder="Enter Rank (e.g. 1200)" required>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label fw-bold text-end">Category</label>
                        <div class="col-sm-4">
                            <select name="category" class="form-select" required>
                                <option value="OPEN">OPEN</option>
                                <option value="OBC-NCL">OBC-NCL</option>
                                <option value="SC">SC</option>
                                <option value="ST">ST</option>
                                <option value="EWS">EWS</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <label class="col-sm-4 col-form-label fw-bold text-end">Gender Pool</label>
                        <div class="col-sm-4">
                            <select name="gender" class="form-select" required>
                                <option value="Gender-Neutral">Gender-Neutral</option>
                                <option value="Female-only (including Supernumerary)">Female-only (including Supernumerary)</option>
                            </select>
                        </div>
                    </div>

                    <div class="row mb-3">
                        <div class="col-sm-12 text-center mt-3">
                            <button type="submit" class="btn btn-success btn-lg px-5">Predict Colleges</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <div class="mt-5 mb-5">
            {% if result_table %}
                <h4 class="text-center mb-3">Your Probable Options</h4>
                <div class="table-responsive bg-white p-3 border rounded shadow-sm">
                    {{ result_table | safe }}
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
